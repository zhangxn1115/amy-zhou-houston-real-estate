name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install pnpm
        run: npm install --global pnpm@11.9.0
      - name: Install image optimizer
        run: pnpm install --dir blog-tools --ignore-workspace --frozen-lockfile
      - name: Generate blog
        run: node scripts/generate-blog.mjs
      - name: Optimize uploaded images
        run: node blog-tools/optimize-images.mjs
      - name: Save generated site for the Hong Kong server
        run: |
          if git diff --quiet -- site; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site
          git commit -m "Update generated site [skip ci]"
          git push origin HEAD:main
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
