# Amy Zhou Homes production server SSH hardening.
# Installed as /etc/ssh/sshd_config.d/99-amyzhou-hardening.conf.
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
AuthenticationMethods publickey
AllowUsers ubuntu
LoginGraceTime 30
MaxAuthTries 3
MaxSessions 3
X11Forwarding no
AllowTcpForwarding no
AllowAgentForwarding no
PermitTunnel no
Compression no
DebianBanner no
