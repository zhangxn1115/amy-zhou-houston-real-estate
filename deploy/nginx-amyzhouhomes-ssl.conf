server {
    listen 80;
    listen [::]:80;
    server_name amyzhouhomes.net www.amyzhouhomes.net;
    return 301 https://amyzhouhomes.net$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.amyzhouhomes.net;

    ssl_certificate /etc/letsencrypt/live/amyzhouhomes.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amyzhouhomes.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://amyzhouhomes.net$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name amyzhouhomes.net;

    ssl_certificate /etc/letsencrypt/live/amyzhouhomes.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amyzhouhomes.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/amyzhouhomes.net;
    index index.html;
    charset utf-8;
    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /api/leads {
        limit_req zone=amyzhou_leads burst=3 nodelay;
        limit_req_status 429;
        client_max_body_size 16k;
        proxy_pass http://127.0.0.1:8788/api/leads;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|webp|gif|svg|ico|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        expires 1h;
        try_files $uri =404;
    }

    location = /robots.txt {
        expires 1h;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
}
